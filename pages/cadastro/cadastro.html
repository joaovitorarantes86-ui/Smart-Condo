<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="../../assets/img/logo.png" type="image/png">
  <title>SmartCondo — Cadastro</title>
  <link rel="stylesheet" href="../../assets/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  </head>
<body>
  <main class="container">
    <header class="logo-area">
      <img src="../../assets/img/logo.png" alt="Logo SmartCondo" class="logo">
      <div class="logo-text"><h1>Smart Condo</h1><p>Gestão de Condomínios</p></div>
    </header>
    <h2> Criar conta</h2>
    <p class="subtitle"> Selecione seu perfil para começar o cadastro</p>

    <div class="register-options">
      <a href="sindico.html" class="register-card">
        <img src="/assets/img/icons/star.svg" width="16" height="16" alt="">
        <div>
          <h3>Síndico</h3>
        </div>
        <img src="/assets/img/icons/chevron-right.svg" width="16" height="16" alt="">
      </a>
      <a href="../sindico/cadastrar_porteiro.html" class="register-card">
        <img src="/assets/img/icons/shield-halved.svg" width="16" height="16" alt="">
        <div>
          <h3>Porteiro</h3>
        </div>
        <img src="/assets/img/icons/chevron-right.svg" width="16" height="16" alt="">
      </a>
      <a href="morador.html" class="register-card">
        <img src="/assets/img/icons/user.svg" width="16" height="16" alt="">
        <div>
          <h3>Morador</h3>
        </div>
        <img src="/assets/img/icons/chevron-right.svg" width="16" height="16" alt="">
      </a>
    </div>

    <a href="../../index.html" class="back-link">
      <img src="/assets/img/icons/arrow-left.svg" width="16" height="16" alt=""> Voltar para o login
    </a>
  </main>

  <div class="accessibility-widget">
    <input type="checkbox" id="access-toggle">
    <label for="access-toggle" class="access-button" title="Acessibilidade">
      <img src="../../assets/img/acessibilidade.png" class="access-icon-img" alt="">
    </label>
    <div class="access-menu">
      <label><input type="checkbox" id="font-toggle">  Aumentar fonte</label>
      <label><input type="checkbox" id="contrast-toggle">  Alto contraste</label>
      <label><input type="checkbox" id="read-toggle">  Modo leitura</label>
    </div>
  </div>
</body>
</html>
